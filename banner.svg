<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200" style="background:#0D0D11; border-radius:10px;">
  <!-- Background Grid Pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1A1A22" stroke-width="1"/>
    </pattern>
    
    <!-- Thruster gradient -->
    <linearGradient id="thruster-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0" />
      <stop offset="40%" stop-color="#FF4500" stop-opacity="0.6" />
      <stop offset="70%" stop-color="#FFD700" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1" />
    </linearGradient>

    <!-- Text Reveal Mask -->
    <mask id="text-mask">
      <rect x="0" y="0" width="800" height="200" fill="black" />
      <rect x="240" y="0" width="0" height="200" fill="white">
        <animate 
          attributeName="width" 
          from="0" 
          to="560" 
          dur="1.4s" 
          begin="1.1s" 
          fill="freeze"
          calcMode="spline"
          keyTimes="0; 1"
          keySplines="0.25 0.1 0.25 1.0" />
      </rect>
    </mask>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- High-tech HUD border -->
  <rect x="10" y="10" width="780" height="180" fill="none" stroke="#D9383A" stroke-width="2" rx="8" />
  <rect x="15" y="15" width="770" height="170" fill="none" stroke="#00F0FF" stroke-width="1" stroke-dasharray="20 10" opacity="0.4" rx="6" />

  <!-- Corner tech accents -->
  <path d="M 12 30 L 12 12 L 30 12" fill="none" stroke="#FFD700" stroke-width="3" />
  <path d="M 788 30 L 788 12 L 770 12" fill="none" stroke="#FFD700" stroke-width="3" />
  <path d="M 12 170 L 12 188 L 30 188" fill="none" stroke="#FFD700" stroke-width="3" />
  <path d="M 788 170 L 788 188 L 770 188" fill="none" stroke="#FFD700" stroke-width="3" />

  <!-- Glowing Arc Reactor -->
  <g transform="translate(10, 0)">
    <!-- Crosshairs -->
    <line x1="110" y1="20" x2="110" y2="180" stroke="#00F0FF" stroke-width="0.5" opacity="0.3" stroke-dasharray="5 5" />
    <line x1="30" y1="100" x2="190" y2="100" stroke="#00F0FF" stroke-width="0.5" opacity="0.3" stroke-dasharray="5 5" />

    <!-- Outer Ring -->
    <circle cx="110" cy="100" r="65" fill="none" stroke="#D9383A" stroke-width="2" opacity="0.6" />
    <!-- Segmented Ring (Rotating Clockwise) -->
    <circle cx="110" cy="100" r="55" fill="none" stroke="#00F0FF" stroke-width="5" stroke-dasharray="12 8">
      <animateTransform attributeName="transform" type="rotate" from="0 110 100" to="360 110 100" dur="8s" repeatCount="indefinite" />
    </circle>
    <!-- Middle Ring (Rotating Counter-Clockwise) -->
    <circle cx="110" cy="100" r="40" fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.8" stroke-dasharray="8 6">
      <animateTransform attributeName="transform" type="rotate" from="360 110 100" to="0 110 100" dur="6s" repeatCount="indefinite" />
    </circle>
    <!-- Inner Ring -->
    <circle cx="110" cy="100" r="28" fill="none" stroke="#FFD700" stroke-width="1.5" />
    <!-- Glowing Core (Pulsing) -->
    <circle cx="110" cy="100" r="18" fill="#00F0FF" opacity="0.4">
      <animate attributeName="r" values="15;21;15" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="110" cy="100" r="12" fill="#FFFFFF" />
  </g>

  <!-- Typography & Scanlines (Masked to reveal after flight) -->
  <g mask="url(#text-mask)">
    <!-- Name -->
    <text x="240" y="80" font-family="'Courier New', Courier, monospace" font-size="34" font-weight="bold" fill="#D9383A" letter-spacing="2">UMA ROHITH</text>
    <text x="240" y="115" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="bold" fill="#FFD700" letter-spacing="1">MAHESWARAPU</text>
    
    <!-- Subtitle -->
    <text x="240" y="150" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="600" fill="#00F0FF" letter-spacing="1.5">FULL STACK DEVELOPER | CLOUD ENGINEER</text>

    <!-- Scanline detail -->
    <line x1="240" y1="165" x2="750" y2="165" stroke="#D9383A" stroke-width="2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- Flying Iron Man Suit -->
  <g id="flying-suit">
    <!-- Thruster Trail -->
    <path d="M -90 -6 L -15 -2 L -90 2 Z" fill="url(#thruster-glow)" />
    <path d="M -50 -3 L -15 -1 L -50 1 Z" fill="#FFFFFF" opacity="0.8" />
    
    <!-- Suit Body -->
    <!-- Legs -->
    <path d="M -30 -4 L -10 -3 L -10 3 L -30 4 Z" fill="#D9383A" />
    <path d="M -25 -2 L -12 -1 L -12 1 L -25 2 Z" fill="#FFD700" />
    <!-- Torso -->
    <path d="M -10 -7 L 15 -6 L 15 6 L -10 7 Z" fill="#D9383A" />
    <circle cx="2" cy="0" r="3" fill="#00F0FF" />
    <circle cx="2" cy="0" r="1.2" fill="#FFFFFF" />
    <!-- Helmet -->
    <path d="M 15 -5 L 30 -4 L 30 4 L 15 5 Z" fill="#D9383A" />
    <path d="M 21 -3 L 28 -2 L 28 2 L 21 3 Z" fill="#FFD700" />
    <!-- Eyes -->
    <line x1="23" y1="-1" x2="27" y2="-1" stroke="#00F0FF" stroke-width="0.8" />
    <line x1="23" y1="1" x2="27" y2="1" stroke="#00F0FF" stroke-width="0.8" />

    <!-- Flight translation animation -->
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="-100, 100" 
      to="900, 100" 
      dur="1.8s" 
      begin="0.6s" 
      fill="freeze"
      calcMode="spline"
      keyTimes="0; 1"
      keySplines="0.25 0.1 0.25 1.0" />
  </g>
</svg>
